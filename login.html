<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackit – Log In</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { overflow: hidden; }

    .wave-light {
      position: fixed;
      right: 0;
      top: 60px;
      width: 50%;
      z-index: 0;
      pointer-events: none;
    }

    .wave-dark {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 74px);
      padding: 40px 20px;
    }

    .login-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 44px 48px 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow);
    }

    .login-avatar {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .login-avatar .avatar-circle {
      width: 72px;
      height: 72px;
      background: var(--green-main);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-avatar svg {
      width: 40px;
      height: 40px;
      fill: var(--white);
    }

    .login-field {
      margin-bottom: 20px;
    }

    .login-field label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-with-icon {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-with-icon .icon-left {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      display: flex;
    }

    .input-with-icon .icon-right {
      position: absolute;
      right: 14px;
      color: var(--text-muted);
      display: flex;
      cursor: pointer;
    }

    .input-with-icon .form-control {
      padding-left: 44px;
      padding-right: 44px;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .remember-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      accent-color: var(--green-main);
    }

    .remember-row label {
      font-size: 0.93rem;
      color: var(--text-mid);
    }

    .btn-login {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      background: var(--green-main);
      color: var(--white);
      border: none;
      margin-bottom: 18px;
    }

    .forgot-link {
      display: block;
      text-align: center;
      color: var(--green-main);
      font-size: 0.93rem;
      text-decoration: none;
      border-bottom: 1.5px solid var(--green-main);
      padding-bottom: 2px;
      width: fit-content;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <!-- Light wave -->
  <svg class="wave-light" viewBox="0 0 660 520" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M660 0 C560 70, 420 30, 320 120 C220 210, 120 170, 0 250 L0 520 L660 520 Z"
          fill="#d6f0e0" opacity="0.7"/>
  </svg>

  <!-- Dark wave -->
  <svg class="wave-dark" viewBox="0 0 1280 380" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 240 C90 195, 210 285, 370 240 C510 198, 590 270, 740 215
             C880 162, 980 258, 1130 198 C1220 165, 1260 185, 1280 175
             L1280 380 L0 380 Z"
          fill="url(#wgLogin)"/>
    <defs>
      <linearGradient id="wgLogin" x1="0" y1="0" x2="1280" y2="0">
        <stop offset="0%" stop-color="#3cb871" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#1a6b3c"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/ECGApp/" class="navbar-brand">
      <svg class="logo-icon" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="21" cy="21" r="21" fill="#f1f5f9"/>
        <rect x="18" y="8"  width="6" height="26" rx="2" fill="#34a853"/>
        <rect x="8"  y="18" width="26" height="6"  rx="2" fill="#ea4335"/>
        <rect x="8"  y="18" width="13" height="6"  rx="2" fill="#4285f4"/>
        <rect x="18" y="8"  width="6"  height="13" rx="2" fill="#fbbc05"/>
      </svg>
      <span class="brand-name">trackit</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="/ECGApp/newpatient">New Patient</a></li>
      <li><a href="/ECGApp/findpatient">Find Patient</a></li>
      <li><a href="#">Patient connection</a></li>
      <li><a href="#">Medication</a></li>
      <li><a href="/ECGApp/monitor">ECG</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="#" class="btn btn-outline">Create Account</a>
      <a href="login.html" class="btn btn-primary">Log In</a>
    </div>
  </nav>

  <!-- Login form -->
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-avatar">
        <div class="avatar-circle">
          <!-- Users icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
          </svg>
        </div>
      </div>
	
      <form id="loginForm">
        <div class="login-field">
          <label for="username">Username</label>
          <div class="input-with-icon">
            <span class="icon-left">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username" />
          </div>
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <div class="input-with-icon">
            <span class="icon-left">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" autocomplete="current-password" class="form-control" placeholder="Enter your password" name="password_plain"/>
            <span class="icon-right" seen=false id="pwd-toggle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember me</label>
        </div>

        <button type = "submit" class="btn btn-login">Login</button>
	    </form>
      <a href="#" class="forgot-link">Forgot Password</a>

    </div>
  </div>
  <script src=JS/login.js></script>
</body>
</html>
