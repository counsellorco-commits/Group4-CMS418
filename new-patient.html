<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackit – New Patient</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body {
      background: var(--bg);
    }

    /* Decorative blobs */
    .blob-light {
      position: fixed;
      top: 60px;
      right: 0;
      width: 38%;
      pointer-events: none;
      z-index: 0;
    }

    .blob-dark {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 28%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Main layout ─────────────────────────── */
    .main-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 28px;
      max-width: 1160px;
      margin: 30px auto;
      padding: 0 28px;
    }

    /* ── Form sections ───────────────────────── */
    .form-sections {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-card .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 32px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      align-items: center;
      gap: 8px;
    }

    .field-row label {
      font-size: 0.9rem;
      color: var(--text-mid);
      white-space: nowrap;
    }

    /* ── Profile photo card ──────────────────── */
    .photo-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 18px;
    }

    .photo-card-heading {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .photo-card-heading .cam-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--green-main);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-card-heading h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .photo-preview {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: repeating-conic-gradient(#e5e7eb 0% 25%, #f9fafb 0% 50%) 0 0 / 20px 20px;
    }

    .btn-upload {
      width: 100%;
      justify-content: center;
      background: var(--green-dark);
      color: var(--white);
      border: none;
      padding: 13px;
      font-size: 0.95rem;
      border-radius: var(--radius-md);
    }

    /* ── Action buttons ──────────────────────── */
    .action-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 20px 28px 36px;
    }

    .btn-clear {
      background: var(--white);
      color: var(--text-mid);
      border: 1.5px solid var(--border);
      padding: 12px 40px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-save {
      background: var(--green-dark);
      color: var(--white);
      border: none;
      padding: 12px 44px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Decorative -->
  <svg class="blob-light" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M500 0 C400 60, 310 20, 240 90 C170 160, 90 140, 0 200 L0 400 L500 400 Z"
          fill="#d6f0e0" opacity="0.6"/>
  </svg>
  <svg class="blob-dark" viewBox="0 0 360 380" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M360 380 L0 380 C0 300, 60 260, 120 230 C200 190, 280 240, 360 180 Z"
          fill="url(#blobGrad)"/>
    <defs>
      <linearGradient id="blobGrad" x1="0" y1="180" x2="360" y2="380">
        <stop offset="0%" stop-color="#3cb871" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#1a6b3c"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/ECGApp/" class="navbar-brand">
      <svg class="logo-icon" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="21" cy="21" r="21" fill="#f1f5f9"/>
        <rect x="18" y="8"  width="6" height="26" rx="2" fill="#34a853"/>
        <rect x="8"  y="18" width="26" height="6"  rx="2" fill="#ea4335"/>
        <rect x="8"  y="18" width="13" height="6"  rx="2" fill="#4285f4"/>
        <rect x="18" y="8"  width="6"  height="13" rx="2" fill="#fbbc05"/>
      </svg>
      <span class="brand-name">trackit</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="/ECGApp/newpatient" class="active">New Patient</a></li>
      <li><a href="/ECGApp/findpatient">Find Patient</a></li>
      <li><a href="#">Patient connection</a></li>
      <li><a href="#">Medication</a></li>
      <li><a href="/ECGApp/monitor">Monitor</a></li>
    </ul>
  </nav>

  <!-- Main content -->
  <div class="main-grid">

    <!-- Left: form sections -->
    <div class="form-sections">

      <!-- Personal Information -->
      <div>
        <div class="section-heading">
          <div class="section-icon">
            <!-- person icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </div>
          <h2>Personal Information</h2>
        </div>

        <div class="section-card">
          <div class="form-grid-2">

            <div class="field-row">
              <label for="national-id">National ID</label>
              <input type="text" id="national-id" class="form-control" value="11165435916" />
            </div>

            <div class="field-row">
              <label for="genotype">Genotype</label>
              <select id="genotype" class="form-control">
                <option>B+</option>
                <option>AA</option>
                <option>AS</option>
                <option>SS</option>
              </select>
            </div>

            <div class="field-row">
              <label for="gender">Gender</label>
              <select id="gender" class="form-control">
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>

            <div class="field-row">
              <label for="first-name">First Name</label>
              <input type="text" id="first-name" class="form-control" value="John" />
            </div>

            <div class="field-row">
              <label for="mobile">Mobile</label>
              <input type="text" id="mobile" class="form-control" value="09015344428" />
            </div>

            <div class="field-row">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" class="form-control" value="Doe" />
            </div>

            <div class="field-row">
              <label for="email">E-mail</label>
              <input type="email" id="email" class="form-control" value="johndoe@gmail.com" />
            </div>

            <div class="field-row">
              <label for="age">Age</label>
              <input type="number" id="age" class="form-control" value="25" />
            </div>

            <div class="field-row">
              <label for="department">Department</label>
              <input type="text" id="department" class="form-control" value="Orthopedic" />
            </div>

            <div class="field-row">
              <label for="dob">Date of Birth</label>
              <div class="input-icon-wrap">
                <input type="text" id="dob" class="form-control" value="11-Sep-2000" />
                <span class="icon-right">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8"  y1="2" x2="8"  y2="6"/>
                    <line x1="3"  y1="10" x2="21" y2="10"/>
                  </svg>
                </span>
              </div>
            </div>

            <div class="field-row" style="grid-column: 1;">
              <label for="marital">Marital Status</label>
              <select id="marital" class="form-control">
                <option>Single</option>
                <option>Married</option>
                <option>Divorced</option>
                <option>Widowed</option>
              </select>
            </div>

            <div class="field-row" style="grid-column: 1;">
              <label for="blood-type">Blood Type</label>
              <select id="blood-type" class="form-control">
                <option>O-</option>
                <option>O+</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- Address Information -->
      <div>
        <div class="section-heading">
          <div class="section-icon">
            <!-- location pin icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
            </svg>
          </div>
          <h2>Address Information</h2>
        </div>

        <div class="section-card">
          <div class="form-grid-2">

            <div class="field-row">
              <label for="country">Country</label>
              <select id="country" class="form-control">
                <option>Nigeria</option>
                <option>Ghana</option>
              </select>
            </div>

            <div class="field-row">
              <label for="zip">Zip Code</label>
              <input type="text" id="zip" class="form-control" value="100502" />
            </div>

            <div class="field-row">
              <label for="state">State</label>
              <select id="state" class="form-control">
                <option>Rivers State</option>
                <option>Lagos State</option>
                <option>Abuja</option>
              </select>
            </div>

            <div class="field-row">
              <label for="street">Street</label>
              <input type="text" id="street" class="form-control" value="10 Haven Avenue" />
            </div>

            <div class="field-row">
              <label for="city">City</label>
              <select id="city" class="form-control">
                <option>Port Harcourt</option>
                <option>Lagos</option>
                <option>Abuja</option>
              </select>
            </div>

          </div>
        </div>
      </div>

    </div><!-- /form-sections -->

    <!-- Right: profile photo -->
    <div class="photo-card">
      <div class="photo-card-heading">
        <div class="cam-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
            <path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4z"/>
            <path d="M9 3L7.17 5H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.17L15 3H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
          </svg>
        </div>
        <h3>Profile photo</h3>
      </div>

      <div class="photo-preview"></div>

      <button class="btn btn-upload">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload Photo
      </button>
    </div>

  </div><!-- /main-grid -->

  <!-- Save / Clear actions -->
  <div class="action-row">
    <button class="btn-clear">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Clear
    </button>
    <button class="btn-save">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Save
    </button>
  </div>
  <script src="JS/newPatientValidator.js"></script>
</body>
</html>
